name: exam_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
 
  cupertino_icons: ^1.0.8
  injectable:
  get_it:
  retrofit: ^4.9.0
  json_annotation: ^4.9.0
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  internet_connection_checker_plus: ^2.9.1+2
  shared_preferences: ^2.5.4
  equatable: ^2.0.8
  easy_localization: ^3.0.8
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  pinput: ^6.0.2
  shimmer: ^3.0.0
  toastification: ^3.0.3
  image: ^4.8.0
  image_picker: ^1.2.1
  image_cropper: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
 
  flutter_lints: ^6.0.0
  injectable_generator:
  build_runner: 
  retrofit_generator: ^10.0.1
  json_serializable: ^6.10.0

 
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
    - assets/localization/ar-EG.json
    - assets/localization/en-US.json
  fonts:
    - family: RobotoEnglish
      fonts:
        - asset: assets/fonts/english/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/english/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/english/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/english/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/english/Roboto-Bold.ttf
          weight: 700
    - family: RobotoArabic
      fonts:
        - asset: assets/fonts/arabic/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/arabic/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/arabic/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/arabic/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/arabic/Roboto-Bold.ttf
          weight: 700